<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plată Reușită ✅ | Tactical Match-Maker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .success-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: bounceIn 0.8s ease-out 0.3s both;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .success-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--green-400), #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .success-details {
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: var(--radius-lg);
    }
    .success-details .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }
    .success-details .detail-label {
      color: var(--text-muted);
    }
    .success-details .detail-value {
      font-weight: 600;
      color: var(--text-primary);
    }
    .loading-state {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(34, 197, 94, 0.2);
      border-top-color: var(--green-400);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-message {
      color: #ef4444;
      padding: 1rem;
      background: rgba(239, 68, 68, 0.1);
      border-radius: var(--radius-md);
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-card" id="success-card">
      <div class="loading-spinner"></div>
      <p class="loading-state">Se verifică plata...</p>
    </div>
  </div>

  <script>
    async function verifyPayment() {
      const card = document.getElementById('success-card');
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      if (!sessionId) {
        card.innerHTML = `
          <div class="success-icon">❌</div>
          <div class="success-title" style="background:linear-gradient(135deg,#ef4444,#f87171);-webkit-background-clip:text;">Eroare</div>
          <p style="color:var(--text-secondary);margin:1rem 0;">Sesiunea de plată nu a fost găsită.</p>
          <a href="/" class="btn btn-primary" style="display:inline-block;margin-top:1rem;text-decoration:none;">⚽ Înapoi la Meciuri</a>
        `;
        return;
      }

      try {
        const resp = await fetch('/api/verify-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.error || 'Eroare la verificare');
        }

        card.innerHTML = `
          <div class="success-icon">🎉</div>
          <div class="success-title">Plata a fost confirmată!</div>
          <p style="color:var(--text-secondary);margin:0.5rem 0 0 0;">Ești înscris în meci</p>

          <div class="success-details">
            ${data.matchTitle ? `
              <div class="detail-row">
                <span class="detail-label">Meci</span>
                <span class="detail-value">⚽ ${data.matchTitle}</span>
              </div>
            ` : ''}
            ${data.playerName ? `
              <div class="detail-row">
                <span class="detail-label">Jucător</span>
                <span class="detail-value">${data.playerName}</span>
              </div>
            ` : ''}
            ${data.amount ? `
              <div class="detail-row">
                <span class="detail-label">Sumă plătită</span>
                <span class="detail-value" style="color:var(--green-400);">${data.amount} RON</span>
              </div>
            ` : ''}
          </div>

          <a href="/#matches" class="btn btn-primary" style="display:inline-block;margin-top:1rem;text-decoration:none;padding:0.75rem 2rem;">
            ⚽ Mergi la Meciuri
          </a>
        `;
      } catch (err) {
        card.innerHTML = `
          <div class="success-icon">⚠️</div>
          <div class="success-title" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);-webkit-background-clip:text;">Atenție</div>
          <p style="color:var(--text-secondary);margin:1rem 0;">Plata a fost procesată dar verificarea nu a reușit.</p>
          <div class="error-message">${err.message}</div>
          <a href="/#matches" class="btn btn-secondary" style="display:inline-block;margin-top:1.5rem;text-decoration:none;">⚽ Înapoi la Meciuri</a>
        `;
      }
    }

    verifyPayment();
  </script>
</body>
</html>
