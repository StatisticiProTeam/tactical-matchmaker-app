<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The Tactical Match-Maker — Platforma #1 pentru fotbaliștii amatori din România. Sistem ELO, carduri de jucător dinamice și matchmaking inteligent.">
  <meta name="theme-color" content="#0a0e17">
  <title>Tactical Match-Maker ⚽ | Fotbal Amator cu Rating OVR</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-512.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MatchMaker">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand" onclick="App.navigate('home')">
        <div class="brand-icon">⚽</div>
        <span>Tactical<span style="color:var(--green-400);">Match</span></span>
      </div>

      <button class="mobile-menu-btn" onclick="App.toggleMobileMenu()" aria-label="Menu">☰</button>

      <ul class="navbar-links" id="nav-links">
        <li><a href="#home">🏠 Acasă</a></li>
        <li><a href="#matches">⚽ Meciuri</a></li>
      </ul>

      <div class="navbar-user" id="nav-user-area">
        <!-- Populated by JS -->
      </div>
    </div>
  </nav>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Content -->
  <main id="app-content">
    <!-- Pages rendered here by JS -->
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item active" onclick="App.navigate('home')" data-page="home">
      <span class="bottom-nav-icon">🏠</span>
      <span class="bottom-nav-label">Acasă</span>
    </button>
    <button class="bottom-nav-item" onclick="App.navigate('matches')" data-page="matches">
      <span class="bottom-nav-icon">⚽</span>
      <span class="bottom-nav-label">Meciuri</span>
    </button>
    <button class="bottom-nav-item" onclick="App.navigate('register')" data-page="register" id="bottom-nav-profile">
      <span class="bottom-nav-icon">👤</span>
      <span class="bottom-nav-label">Cont</span>
    </button>
  </nav>

  <!-- Footer -->
  <footer style="border-top:1px solid var(--border-subtle);padding:2rem;text-align:center;color:var(--text-muted);font-size:0.8rem;position:relative;z-index:1;">
    <p>⚽ <strong>Tactical Match-Maker</strong> — Fotbal amator la nivel profesionist</p>
    <p style="margin-top:0.5rem;opacity:0.6;">Made with ❤️ for Romanian amateur football</p>
  </footer>

  <!-- Scripts (order matters) -->
  <script src="js/data.js"></script>
  <script src="js/elo.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/landing.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/matches.js"></script>
  <script src="js/pages/rate.js"></script>
  <script src="js/app.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>

</body>
</html>
