<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plată Anulată | Tactical Match-Maker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cancel-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .cancel-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 3rem;
      max-width: 460px;
      width: 100%;
      text-align: center;
      animation: fadeInUp 0.6s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cancel-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    .cancel-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    .cancel-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .cancel-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .cancel-actions a {
      text-decoration: none;
      padding: 0.75rem 1.5rem;
    }
  </style>
</head>
<body>
  <div class="cancel-page">
    <div class="cancel-card">
      <div class="cancel-icon">🚫</div>
      <div class="cancel-title">Plata a fost anulată</div>
      <p class="cancel-subtitle">
        Nu s-a efectuat nicio plată. Poți reveni oricând<br>
        și te poți înscrie în meci.
      </p>
      <div class="cancel-actions">
        <a href="/#matches" class="btn btn-primary">⚽ Înapoi la Meciuri</a>
      </div>
    </div>
  </div>
</body>
</html>
